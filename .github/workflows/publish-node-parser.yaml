name: Publish Node Parser to PyPI

on:
  push:
    tags:
      - "node-parser-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/llama-index-node-parser-kreuzberg
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Build package
        run: cd node_parsers/llama-index-node-parser-kreuzberg && uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: node_parsers/llama-index-node-parser-kreuzberg/dist/
