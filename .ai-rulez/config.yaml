$schema: https://raw.githubusercontent.com/Goldziher/ai-rulez/main/schema/ai-rules-v3.schema.json
includes:
  - name: kreuzberg-core
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/core
    merge_strategy: local-override
version: "3.0"
name: llama-index-kreuzberg
description: LlamaIndex document reader integration for kreuzberg
gitignore: true

builtins:
  - python
  - security
  - git-workflow
  - code-quality
  - testing
  - token-efficiency
  - default-commands

presets:
  - claude
  - codex
  - copilot
  - cursor
  - antigravity
